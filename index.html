<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pallett Lab</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --sage-bg: #d5d8c5;
      --sage-top: #a4a98d;
      --ink: #1e1e1c;
      --soft: #6f6d67;
      --footer: #171716;
      --footer-text: #e8e1d2;
      --line: rgba(30, 30, 28, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--sage-bg);
      color: var(--ink);
      font-family: "Inter", system-ui, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      background: var(--sage-top);
      border-bottom: 1px solid var(--line);
      padding: 24px 20px 22px;
      text-align: center;
    }

    .brand {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.4rem, 5vw, 4.2rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      opacity: 0.95;
    }

    main {
      flex: 1;
      padding: 72px 20px 0;
    }

    .hero {
      max-width: 1120px;
      margin: 0 auto;
      text-align: center;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.42em;
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--soft);
      margin-bottom: 18px;
    }

    h1 {
      font-size: 1.15rem;
      line-height: 1.5;
      font-weight: 400;
      letter-spacing: 0;
      margin: 0 auto;
      color: var(--soft);
    }

    .subtitle {
      margin-top: 24px;
      font-size: 1.15rem;
      color: var(--soft);
      font-weight: 400;
    }

    .hero-image {
      width: min(100%, 900px);
      margin: 56px auto 0;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.10);
    }

    .hero-image img {
      width: 100%;
      display: block;
      filter: grayscale(100%);
    }

    footer {
      margin-top: 72px;
      background: var(--footer);
      color: var(--footer-text);
      text-align: center;
      padding: 46px 20px 52px;
    }

    .footer-title {
      display: inline-block;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .footer-line {
      width: 120px;
      height: 1px;
      background: rgba(232, 225, 210, 0.38);
      margin: 0 auto 18px;
    }

    .contact-item {
      margin: 14px 0;
      font-size: 1.08rem;
      font-weight: 300;
    }

    .contact-item a {
      color: var(--footer-text);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 225, 210, 0.35);
      padding-bottom: 2px;
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 22px 16px 20px;
      }

      .brand {
        font-size: clamp(2rem, 7vw, 3rem);
      }

      .hero {
        padding-top: 10px;
      }

      .hero-image {
        margin-top: 42px;
      }

      footer {
        padding: 64px 16px 72px;
      }

      .contact-item {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">Pallett Lab</div>
  </header>

  <main>
    <section class="hero">
      <div class="eyebrow">Dance &amp; Art Laboratory</div>
      <h1>Pallett Lab je vznikající taneční a kreativní koncept z jižní Moravy.</h1>
      <div class="subtitle">Prostor pro pohyb, tvorbu a objevování</div>

      <div class="hero-image">
        <img src="black-and-white-webovky.jpg" alt="Tanečnice v pohybové pozici ve studiu">
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-title">Kontakt</div>
    <div class="footer-line"></div>
    <div class="contact-item">
      E-mail: <a href="mailto:pallettlab@gmail.com">pallettlab@gmail.com</a>
    </div>
    <div class="contact-item">
      IG: <a href="https://instagram.com/pallett.lab" target="_blank" rel="noreferrer">@pallett.lab</a>
    </div>
  </footer>
</body>
</html>
