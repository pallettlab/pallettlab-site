<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pallett Lab</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    :root{
      --sage:#c8cab7;
      --cream:#f5f1e8;
      --ink:#1c1c1b;
      --soft:#6d6b66;
      --footer:#111111;
      --footerText:#ebe4d6;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--cream);
      color:var(--ink);
      font-family:'Inter',sans-serif;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }

    .topbar{
      background:var(--sage);
      padding:28px 20px;
      text-align:center;
    }

    .brand{
      font-size:clamp(2.2rem,4vw,3.4rem);
      font-weight:500;
      letter-spacing:-0.06em;
    }

    .hero{
      max-width:1200px;
      margin:0 auto;
      padding:90px 20px 0;
      text-align:center;
    }

    .label{
      text-transform:uppercase;
      letter-spacing:0.45em;
      font-size:0.75rem;
      font-weight:600;
      color:var(--soft);
      margin-bottom:26px;
    }

    h1{
      font-size:1.35rem;
      line-height:1.5;
      font-weight:400;
      letter-spacing:-0.01em;
      margin:0 auto;
      color:var(--soft);
    }

    .subtitle{
      margin-top:24px;
      font-size:1.15rem;
      color:var(--soft);
      font-weight:400;
    }

    .hero-image{
      width:min(100%,900px);
      margin:56px auto 0;
      overflow:hidden;
      box-shadow:0 25px 60px rgba(0,0,0,0.10);
      background:white;
    }

    .hero-image img{
      width:100%;
      display:block;
      filter:grayscale(100%);
    }

    footer{
      margin-top:90px;
      background:var(--footer);
      color:var(--footerText);
      text-align:center;
      padding:80px 20px;
    }

    .contact-item{
      margin:14px 0;
      font-size:1.15rem;
      font-weight:300;
    }

    .contact-item a{
      color:var(--footerText);
      text-decoration:none;
      border-bottom:1px solid rgba(235,228,214,0.35);
      padding-bottom:2px;
    }

    @media(max-width:768px){

      .topbar{
        padding:24px 16px;
      }

      .hero{
        padding-top:64px;
      }

      h1{
        max-width:12ch;
      }

      .subtitle{
        font-size:1rem;
      }

      footer{
        padding:60px 20px;
      }

      .contact-item{
        font-size:1rem;
      }

    }

  </style>
</head>

<body>

  <header class="topbar">
    <div class="brand">
      Pallett Lab
    </div>
  </header>

  <main class="hero">

    <div class="label">
      Dance & Art Laboratory
    </div>

    <h1>
      Pallett Lab je vznikající taneční a kreativní koncept z jižní Moravy.
    </h1>

    <div class="subtitle">
      Prostor pro pohyb, tvorbu a objevování
    </div>

    <div class="hero-image">
      <img
        src="black-and-white-webovky.jpg"
        alt="Pallett Lab dance studio"
      >
    </div>

  </main>

  <footer>

    <div class="contact-item">
      E-mail:
      <a href="mailto:pallettlab@gmail.com">
        pallettlab@gmail.com
      </a>
    </div>

    <div class="contact-item">
      IG:
      <a href="https://instagram.com/pallett.lab" target="_blank">
        @pallett.lab
      </a>
    </div>

  </footer>

</body>
</html>
